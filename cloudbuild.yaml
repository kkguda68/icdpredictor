steps:
  # Step 1: Install dependencies and run data preparation (replaces venv & prepare_data.py)
  - name: 'python:3.11'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install -r requirements.txt
        python src/prepare_data.py

  # Step 2: Enable services and ensure Artifact Registry exists
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud services enable aiplatform.googleapis.com artifactregistry.googleapis.com cloudbuild.googleapis.com
        if ! gcloud artifacts repositories describe icd-training --location=us-central1 > /dev/null 2>&1; then
          echo "Creating artifact registry repository 'icd-training'..."
          gcloud artifacts repositories create icd-training --repository-format=docker --location=us-central1
        else
          echo "Repository 'icd-training' already exists, skipping creation."
        fi

  # Step 3: Build the Docker image for Vertex AI
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/icd-training/icdpredictorpubmedbert:$BUILD_ID', 'vertex/']

  # Step 4: Push the Docker image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/icd-training/icdpredictorpubmedbert:$BUILD_ID']

  # Step 5: Submit the Vertex AI Training job
  - name: 'python:3.11'
    entrypoint: 'bash'
    env:
      - 'IMAGE_TAG=$BUILD_ID'
    args:
      - '-c'
      - |
        pip install google-cloud-aiplatform
        python vertex/submit_job.py

  # Step 6: Build and push the Serving Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/icd-training/pubmedbert-serve:$BUILD_ID', 'vertex/serving/']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/icd-training/pubmedbert-serve:$BUILD_ID']

  # Step 7: Register to Model Registry and Deploy Endpoint
  - name: 'python:3.11'
    entrypoint: 'bash'
    env:
      - 'IMAGE_TAG=$BUILD_ID'
    args:
      - '-c'
      - |
        pip install google-cloud-aiplatform
        python vertex/serving/deploy_model.py

options:
  logging: CLOUD_LOGGING_ONLY